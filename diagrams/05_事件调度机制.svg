<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="600" viewBox="0 0 1140 600" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1140" height="600" fill="#ffffff"/>
  <text x="36" y="40" font-size="23" font-weight="700" fill="#0f172a">事件调度机制 · Kafka 异步削峰落库</text>

  <!-- Producer -->
  <rect x="28" y="226" width="196" height="96" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="126" y="262" font-size="14" font-weight="700" fill="#065f46" text-anchor="middle">EnrollmentService</text>
  <text x="126" y="284" font-size="12" fill="#047857" text-anchor="middle">AsyncPersister</text>
  <text x="126" y="304" font-size="11" fill="#64748b" text-anchor="middle">生产者 Producer</text>

  <!-- Kafka topic -->
  <rect x="282" y="78" width="420" height="392" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="300" y="104" font-size="14" font-weight="700" fill="#b45309">Kafka Topic · enroll-events</text>
  <!-- partitions -->
  <g font-size="12" fill="#92400e">
    <g>
      <rect x="300" y="118" width="384" height="68" rx="8" fill="#ffffff" stroke="#fcd34d" filter="url(#sh)"/>
      <text x="312" y="138" font-weight="600">Partition 0</text>
      <g fill="#fde68a" stroke="#f59e0b"><rect x="312" y="146" width="40" height="30" rx="4"/><rect x="356" y="146" width="40" height="30" rx="4"/><rect x="400" y="146" width="40" height="30" rx="4" fill="#fcd34d"/><rect x="444" y="146" width="40" height="30" rx="4" fill="#fff7ed"/></g>
    </g>
    <g>
      <rect x="300" y="200" width="384" height="68" rx="8" fill="#ffffff" stroke="#fcd34d" filter="url(#sh)"/>
      <text x="312" y="220" font-weight="600">Partition 1</text>
      <g fill="#fde68a" stroke="#f59e0b"><rect x="312" y="228" width="40" height="30" rx="4"/><rect x="356" y="228" width="40" height="30" rx="4" fill="#fcd34d"/><rect x="400" y="228" width="40" height="30" rx="4" fill="#fff7ed"/></g>
    </g>
    <g>
      <rect x="300" y="282" width="384" height="68" rx="8" fill="#ffffff" stroke="#fcd34d" filter="url(#sh)"/>
      <text x="312" y="302" font-weight="600">Partition 2</text>
      <g fill="#fde68a" stroke="#f59e0b"><rect x="312" y="310" width="40" height="30" rx="4"/><rect x="356" y="310" width="40" height="30" rx="4"/><rect x="400" y="310" width="40" height="30" rx="4" fill="#fcd34d"/><rect x="444" y="310" width="40" height="30" rx="4"/><rect x="488" y="310" width="40" height="30" rx="4" fill="#fff7ed"/></g>
    </g>
  </g>
  <rect x="300" y="372" width="384" height="80" rx="8" fill="#fffdf5" stroke="#fde68a"/>
  <text x="312" y="394" font-size="11.5" fill="#b45309" font-weight="600">分区路由：key = courseId</text>
  <text x="312" y="414" font-size="11" fill="#92400e">⇒ 同一课程的事件进入同一分区</text>
  <text x="312" y="432" font-size="11" fill="#92400e">⇒ 分区内严格有序；多分区并行提升吞吐</text>

  <!-- Consumer group -->
  <rect x="742" y="110" width="364" height="232" rx="12" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="760" y="136" font-size="14" font-weight="700" fill="#0369a1">Consumer Group · enroll-consumer</text>
  <rect x="766" y="150" width="316" height="78" rx="8" fill="#ffffff" stroke="#7dd3fc" filter="url(#sh)"/>
  <text x="780" y="174" font-size="13" font-weight="600" fill="#075985">Consumer #1</text>
  <text x="780" y="194" font-size="11" fill="#64748b">@KafkaListener</text>
  <text x="780" y="212" font-size="11" fill="#64748b">订阅 Partition 0,1</text>
  <rect x="766" y="244" width="316" height="78" rx="8" fill="#ffffff" stroke="#7dd3fc" filter="url(#sh)"/>
  <text x="780" y="268" font-size="13" font-weight="600" fill="#075985">Consumer #2</text>
  <text x="780" y="288" font-size="11" fill="#64748b">@KafkaListener</text>
  <text x="780" y="306" font-size="11" fill="#64748b">订阅 Partition 2</text>

  <!-- MySQL -->
  <g filter="url(#sh)">
    <path d="M834,430 a86,13 0 0 1 172,0 v52 a86,13 0 0 1 -172,0 z" fill="#f0f9ff" stroke="#0ea5e9"/>
    <ellipse cx="920" cy="430" rx="86" ry="13" fill="#fff" stroke="#0ea5e9"/>
  </g>
  <text x="920" y="466" font-size="13" font-weight="700" fill="#0369a1" text-anchor="middle">MySQL · enrollment</text>

  <!-- idempotency note -->
  <rect x="28" y="360" width="236" height="150" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="44" y="382" font-size="12.5" font-weight="700" fill="#334155">投递语义与幂等</text>
  <text x="44" y="404" font-size="11" fill="#475569">• at-least-once（至少一次）</text>
  <text x="44" y="424" font-size="11" fill="#475569">• 消费前 existsBy(stuId,courseId)</text>
  <text x="44" y="444" font-size="11" fill="#475569">• DB 唯一索引兜底</text>
  <text x="44" y="464" font-size="11" fill="#475569">• 成功后手动提交 offset</text>
  <text x="44" y="484" font-size="11" fill="#475569">• 失败不提交 → 自动重投</text>
  <text x="44" y="503" font-size="11" fill="#16a34a" font-weight="600">⇒ 不丢、不重复</text>

  <!-- arrows -->
  <g fill="none">
    <path d="M224,272 L278,200" stroke="#334155" stroke-width="1.8" marker-end="url(#a1)"/>
    <!-- partitions to consumers -->
    <path d="M684,152 L764,178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>
    <path d="M684,234 L764,200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>
    <path d="M684,316 L764,278" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>
    <!-- consumers to mysql -->
    <path d="M905,228 C905,360 918,390 920,418" stroke="#334155" stroke-width="1.7" marker-end="url(#a1)"/>
    <path d="M905,322 C905,370 918,395 921,418" stroke="#334155" stroke-width="1.7" marker-end="url(#a1)"/>
    <!-- degrade bypass -->
    <path d="M126,322 C126,560 700,565 834,470" stroke="#a855f7" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#a1)"/>
  </g>
  <g font-size="11" fill="#334155">
    <text x="232" y="225">send(key=courseId)</text>
    <text x="232" y="240" fill="#64748b">value = EnrollEvent(JSON)</text>
    <text x="690" y="120" fill="#475569">拉取消费</text>
    <text x="935" y="400" fill="#475569">幂等写入</text>
  </g>
  <text x="380" y="556" font-size="11.5" fill="#7c2d92" font-weight="600">降级旁路：persist-mode=sync 时由 SyncPersister 直接写库，跳过 Kafka（DD6）</text>
</svg>
