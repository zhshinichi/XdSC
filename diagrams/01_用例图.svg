<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="36" y="40" font-size="23" font-weight="700" fill="#0f172a">高校抢课系统 · 用例图</text>

  <!-- system boundary -->
  <rect x="230" y="60" width="540" height="510" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="500" y="86" font-size="15" font-weight="700" fill="#475569" text-anchor="middle">高校抢课系统</text>

  <!-- connection lines (drawn first, under ellipses) -->
  <g stroke="#94a3b8" stroke-width="1.3">
    <!-- student -->
    <line x1="140" y1="300" x2="290" y2="190"/>
    <line x1="140" y1="300" x2="290" y2="250"/>
    <line x1="140" y1="300" x2="285" y2="320"/>
    <line x1="140" y1="300" x2="290" y2="390"/>
    <line x1="140" y1="300" x2="290" y2="455"/>
    <line x1="140" y1="300" x2="430" y2="110"/>
    <!-- admin -->
    <line x1="860" y1="300" x2="712" y2="195"/>
    <line x1="860" y1="300" x2="712" y2="275"/>
    <line x1="860" y1="300" x2="712" y2="355"/>
    <line x1="860" y1="300" x2="712" y2="435"/>
    <line x1="860" y1="300" x2="570" y2="110"/>
  </g>

  <!-- shared use case -->
  <g text-anchor="middle">
    <ellipse cx="500" cy="110" rx="72" ry="27" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh)"/>
    <text x="500" y="115" font-size="14" font-weight="600" fill="#5b21b6">登录</text>
  </g>

  <!-- student use cases -->
  <g text-anchor="middle" font-size="14" fill="#1e3a8a">
    <ellipse cx="360" cy="190" rx="70" ry="26" fill="#eff6ff" stroke="#3b82f6" filter="url(#sh)"/><text x="360" y="195">注册</text>
    <ellipse cx="360" cy="250" rx="70" ry="26" fill="#eff6ff" stroke="#3b82f6" filter="url(#sh)"/><text x="360" y="255">浏览课程</text>
    <ellipse cx="358" cy="320" rx="80" ry="30" fill="#dbeafe" stroke="#2563eb" stroke-width="2.2" filter="url(#sh)"/><text x="358" y="325" font-weight="700" font-size="15">抢课</text>
    <ellipse cx="360" cy="390" rx="70" ry="26" fill="#eff6ff" stroke="#3b82f6" filter="url(#sh)"/><text x="360" y="395">退课</text>
    <ellipse cx="360" cy="455" rx="70" ry="26" fill="#eff6ff" stroke="#3b82f6" filter="url(#sh)"/><text x="360" y="460">查看课表</text>
  </g>

  <!-- admin use cases -->
  <g text-anchor="middle" font-size="14" fill="#065f46">
    <ellipse cx="640" cy="195" rx="70" ry="26" fill="#ecfdf5" stroke="#10b981" filter="url(#sh)"/><text x="640" y="200">发布课程</text>
    <ellipse cx="640" cy="275" rx="70" ry="26" fill="#ecfdf5" stroke="#10b981" filter="url(#sh)"/><text x="640" y="280">管理批次</text>
    <ellipse cx="640" cy="355" rx="70" ry="26" fill="#ecfdf5" stroke="#10b981" filter="url(#sh)"/><text x="640" y="360">预热库存</text>
    <ellipse cx="640" cy="435" rx="70" ry="26" fill="#ecfdf5" stroke="#10b981" filter="url(#sh)"/><text x="640" y="440">选课统计</text>
  </g>

  <!-- Actor: student -->
  <g stroke="#2563eb" stroke-width="2.2" fill="none">
    <circle cx="100" cy="258" r="15" fill="#dbeafe"/>
    <line x1="100" y1="273" x2="100" y2="318"/>
    <line x1="72" y1="290" x2="128" y2="290"/>
    <line x1="100" y1="318" x2="80" y2="350"/>
    <line x1="100" y1="318" x2="120" y2="350"/>
  </g>
  <text x="100" y="372" font-size="14" font-weight="600" fill="#1e3a8a" text-anchor="middle">学生</text>

  <!-- Actor: admin -->
  <g stroke="#059669" stroke-width="2.2" fill="none">
    <circle cx="900" cy="258" r="15" fill="#d1fae5"/>
    <line x1="900" y1="273" x2="900" y2="318"/>
    <line x1="872" y1="290" x2="928" y2="290"/>
    <line x1="900" y1="318" x2="880" y2="350"/>
    <line x1="900" y1="318" x2="920" y2="350"/>
  </g>
  <text x="900" y="372" font-size="14" font-weight="600" fill="#065f46" text-anchor="middle">教务管理员</text>
</svg>
