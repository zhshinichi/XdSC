<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1100" height="560" fill="#ffffff"/>
  <text x="36" y="40" font-size="23" font-weight="700" fill="#0f172a">数据存储分布与一致性模型</text>

  <!-- entry -->
  <rect x="110" y="64" width="160" height="34" rx="17" fill="#dbeafe" stroke="#3b82f6" filter="url(#sh)"/>
  <text x="190" y="86" font-size="13" font-weight="600" fill="#1e3a8a" text-anchor="middle">抢课请求</text>

  <!-- Redis -->
  <rect x="40" y="120" width="300" height="300" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
  <text x="58" y="148" font-size="15" font-weight="700" fill="#b91c1c">Redis · 内存快路径</text>
  <text x="58" y="168" font-size="11" fill="#991b1b">高速、原子；抢课期"名额"权威源</text>
  <g font-size="12">
    <rect x="58" y="182" width="264" height="58" rx="8" fill="#fff" stroke="#fca5a5"/>
    <text x="70" y="202" font-weight="600" fill="#7f1d1d">course:stock:{id}</text>
    <text x="70" y="222" fill="#475569" font-size="11">String(int) · 剩余名额（原子扣减/回补）</text>
    <rect x="58" y="248" width="264" height="58" rx="8" fill="#fff" stroke="#fca5a5"/>
    <text x="70" y="268" font-weight="600" fill="#7f1d1d">course:enrolled:{id}</text>
    <text x="70" y="288" fill="#475569" font-size="11">Set · 已选学生集合（防重复）</text>
    <rect x="58" y="314" width="264" height="58" rx="8" fill="#fff" stroke="#fca5a5"/>
    <text x="70" y="334" font-weight="600" fill="#7f1d1d">ratelimit:enroll:{uid}</text>
    <text x="70" y="354" fill="#475569" font-size="11">String(计数) · 限流（带 TTL 过期）</text>
  </g>
  <text x="58" y="398" font-size="11" fill="#991b1b">由 try_enroll.lua / rate_limit.lua 原子操作</text>

  <!-- Kafka -->
  <rect x="392" y="196" width="226" height="150" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="505" y="226" font-size="14" font-weight="700" fill="#b45309" text-anchor="middle">Kafka</text>
  <text x="505" y="248" font-size="12" fill="#92400e" text-anchor="middle">topic: enroll-events</text>
  <text x="505" y="284" font-size="11.5" fill="#92400e" text-anchor="middle">选课成功事件的</text>
  <text x="505" y="302" font-size="11.5" fill="#92400e" text-anchor="middle">缓冲管道（削峰）</text>
  <text x="505" y="324" font-size="11" fill="#a16207" text-anchor="middle">解耦"扣减"与"落库"</text>

  <!-- MySQL -->
  <rect x="670" y="120" width="390" height="340" rx="12" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="688" y="148" font-size="15" font-weight="700" fill="#0369a1">MySQL · 持久化（最终一致）</text>
  <text x="688" y="168" font-size="11" fill="#075985">选课结果与统计的权威持久来源</text>
  <g font-size="12" fill="#0c4a6e">
    <rect x="688" y="182" width="354" height="40" rx="8" fill="#fff" stroke="#7dd3fc"/><text x="702" y="207">users（用户：username 唯一）</text>
    <rect x="688" y="230" width="354" height="40" rx="8" fill="#fff" stroke="#7dd3fc"/><text x="702" y="255">enroll_batch（批次：open_at, close_at）</text>
    <rect x="688" y="278" width="354" height="40" rx="8" fill="#fff" stroke="#7dd3fc"/><text x="702" y="303">course（课程：capacity, batch_id FK）</text>
    <rect x="688" y="326" width="354" height="52" rx="8" fill="#fff" stroke="#0ea5e9" stroke-width="1.6"/><text x="702" y="348" font-weight="600">enrollment（选课记录）</text><text x="702" y="368" font-size="11" fill="#475569">唯一索引 (student_id, course_id) · idx course_id</text>
  </g>
  <text x="688" y="404" font-size="11" fill="#075985">幂等落库；select count 即选课人数（统计来源）</text>

  <!-- arrows -->
  <g fill="none">
    <path d="M190,98 L190,116" stroke="#334155" stroke-width="1.8" marker-end="url(#a1)"/>
    <path d="M340,262 L388,262" stroke="#334155" stroke-width="1.8" marker-end="url(#a1)"/>
    <path d="M618,262 L666,262" stroke="#334155" stroke-width="1.8" marker-end="url(#a1)"/>
    <!-- reconcile -->
    <path d="M690,440 C470,500 360,500 200,424" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#a2)"/>
  </g>
  <g font-size="11.5" font-weight="600">
    <text x="74" y="113" fill="#b91c1c">① Lua 原子扣减（强一致·权威）</text>
    <text x="346" y="252" fill="#334155">② 发事件</text>
    <text x="624" y="252" fill="#334155">③ 异步落库</text>
    <text x="430" y="492" fill="#64748b">定时对账校正 Redis↔MySQL（设计）</text>
  </g>

  <!-- banner -->
  <rect x="40" y="506" width="1020" height="40" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="58" y="531" font-size="12" fill="#334155">一致性模型：抢课期"剩余名额"以 <tspan font-weight="700" fill="#b91c1c">Redis</tspan> 为准（原子扣减·强一致）；<tspan font-weight="700" fill="#0369a1">MySQL</tspan> 为持久与统计权威；二者经 <tspan font-weight="700" fill="#b45309">Kafka</tspan> 达成最终一致，对账任务校正偏差。</text>
</svg>
