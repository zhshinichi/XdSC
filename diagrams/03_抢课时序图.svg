<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#334155"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="36" y="40" font-size="23" font-weight="700" fill="#0f172a">核心抢课链路 · 时序图</text>

  <!-- lifelines -->
  <g stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="4 5">
    <line x1="80" y1="92" x2="80" y2="690"/>
    <line x1="235" y1="92" x2="235" y2="690"/>
    <line x1="395" y1="92" x2="395" y2="690"/>
    <line x1="555" y1="92" x2="555" y2="690"/>
    <line x1="710" y1="92" x2="710" y2="690"/>
    <line x1="875" y1="92" x2="875" y2="690"/>
    <line x1="1035" y1="92" x2="1035" y2="690"/>
    <line x1="1190" y1="92" x2="1190" y2="690"/>
  </g>

  <!-- activation bar on EnrollmentService -->
  <rect x="550" y="232" width="10" height="232" fill="#e2e8f0" stroke="#cbd5e1"/>

  <!-- headers -->
  <g text-anchor="middle" font-size="12" font-weight="600">
    <rect x="40" y="52" width="80" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" filter="url(#sh)"/><text x="80" y="77" fill="#1e3a8a">学生</text>
    <rect x="167" y="52" width="136" height="40" rx="8" fill="#eff6ff" stroke="#93c5fd" filter="url(#sh)"/><text x="235" y="70" fill="#1e293b">Controller</text><text x="235" y="85" font-size="10" fill="#64748b">+JwtAuthFilter</text>
    <rect x="327" y="52" width="136" height="40" rx="8" fill="#f5f3ff" stroke="#c4b5fd" filter="url(#sh)"/><text x="395" y="77" fill="#1e293b">RateLimiter</text>
    <rect x="487" y="52" width="136" height="40" rx="8" fill="#ecfdf5" stroke="#34d399" filter="url(#sh)"/><text x="555" y="77" fill="#065f46">EnrollmentService</text>
    <rect x="642" y="52" width="136" height="40" rx="8" fill="#ecfdf5" stroke="#6ee7b7" filter="url(#sh)"/><text x="710" y="70" fill="#065f46">Course/Batch</text><text x="710" y="85" font-size="10" fill="#64748b">Service</text>
    <rect x="807" y="52" width="136" height="40" rx="8" fill="#fef2f2" stroke="#fca5a5" filter="url(#sh)"/><text x="875" y="70" fill="#b91c1c">RedisStock</text><text x="875" y="85" font-size="10" fill="#7f1d1d">Lua 脚本</text>
    <rect x="967" y="52" width="136" height="40" rx="8" fill="#fffbeb" stroke="#fcd34d" filter="url(#sh)"/><text x="1035" y="77" fill="#b45309">Kafka</text>
    <rect x="1122" y="52" width="136" height="40" rx="8" fill="#f0f9ff" stroke="#7dd3fc" filter="url(#sh)"/><text x="1190" y="70" fill="#0369a1">Consumer</text><text x="1190" y="85" font-size="10" fill="#075985">→ MySQL</text>
  </g>

  <!-- messages -->
  <g font-size="11.5" fill="#334155" text-anchor="middle">
    <!-- M1 -->
    <line x1="80" y1="130" x2="231" y2="130" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="157" y="123">1 POST /api/enroll (JWT)</text>
    <!-- M2 -->
    <line x1="235" y1="166" x2="391" y2="166" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="315" y="159">2 tryAcquire</text>
    <!-- M3 return -->
    <line x1="395" y1="200" x2="239" y2="200" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#a2)"/>
    <text x="317" y="193" fill="#64748b">放行 / 超限→429</text>
    <!-- M4 -->
    <line x1="235" y1="238" x2="549" y2="238" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="392" y="231">4 enroll(courseId, studentId)</text>
    <!-- M5 -->
    <line x1="560" y1="274" x2="706" y2="274" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="633" y="267">5 校验课程&amp;批次开放</text>
    <!-- M6 return -->
    <line x1="710" y1="308" x2="562" y2="308" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#a2)"/>
    <text x="636" y="301" fill="#64748b">ok / 不在窗口→400</text>
    <!-- M7 -->
    <line x1="560" y1="346" x2="871" y2="346" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="715" y="339">7 tryEnroll (Lua 防重+扣减)</text>
    <!-- M8 return -->
    <line x1="875" y1="380" x2="562" y2="380" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#a2)"/>
    <text x="718" y="373" fill="#64748b">SUCCESS / 已选→409 / 已满→409</text>
    <!-- M9 -->
    <line x1="560" y1="418" x2="1031" y2="418" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="795" y="411">9 send(enroll-events, key=courseId)</text>
    <!-- M10 return to student -->
    <line x1="555" y1="456" x2="84" y2="456" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#a2)"/>
    <text x="320" y="449" fill="#1d4ed8" font-weight="600">10 立即返回 200 受理成功 (PENDING)</text>
  </g>

  <!-- async phase divider -->
  <line x1="40" y1="486" x2="1258" y2="486" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 4"/>
  <text x="649" y="481" font-size="12" font-weight="700" fill="#b45309" text-anchor="middle">──── 异步阶段：Kafka 削峰落库（最终一致） ────</text>

  <g font-size="11.5" fill="#334155" text-anchor="middle">
    <!-- M11 -->
    <line x1="1035" y1="520" x2="1186" y2="520" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="1110" y="513">11 投递事件</text>
    <!-- M12 self -->
    <path d="M1190,552 H1244 V572 H1194" fill="none" stroke="#334155" stroke-width="1.5" marker-end="url(#a1)"/>
    <text x="1196" y="545" text-anchor="start">12 幂等写入选课记录 (MySQL)</text>
    <!-- M13 return commit -->
    <line x1="1190" y1="600" x2="1039" y2="600" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#a2)"/>
    <text x="1114" y="593" fill="#64748b">13 手动提交 offset</text>
  </g>

  <text x="36" y="700" font-size="11" fill="#94a3b8">注：同步降级模式下，第 9 步由 SyncEnrollmentPersister 直接写库并返回 ENROLLED，不经 Kafka。</text>
</svg>
