<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="600" viewBox="0 0 1020 600" font-family="'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1020" height="600" fill="#ffffff"/>
  <text x="36" y="40" font-size="23" font-weight="700" fill="#0f172a">数据模型 · ER 图</text>

  <!-- relationship lines (under boxes) -->
  <g stroke="#64748b" stroke-width="1.6" fill="none">
    <line x1="300" y1="120" x2="430" y2="120"/>
    <path d="M560,220 C560,265 760,255 760,300"/>
    <path d="M510,400 C560,360 760,470 760,438"/>
  </g>
  <g font-size="12" fill="#475569" font-weight="600">
    <text x="312" y="112">1</text><text x="410" y="112">N</text>
    <text x="566" y="240">1</text><text x="742" y="296">N</text>
    <text x="516" y="392">1</text><text x="742" y="430">N</text>
    <text x="365" y="138" font-size="11" fill="#94a3b8">包含 batch_id</text>
    <text x="600" y="270" font-size="11" fill="#94a3b8">被选 course_id</text>
    <text x="600" y="455" font-size="11" fill="#94a3b8">选课 student_id</text>
  </g>

  <!-- ENROLL_BATCH -->
  <g filter="url(#sh)">
    <rect x="50" y="60" width="250" height="126" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="50" y="60" width="250" height="30" rx="8" fill="#0ea5e9"/>
    <rect x="50" y="78" width="250" height="12" fill="#0ea5e9"/>
  </g>
  <text x="64" y="81" font-size="14" font-weight="700" fill="#fff">ENROLL_BATCH 抢课批次</text>
  <g font-size="12.5" fill="#1e293b">
    <text x="64" y="110">🔑 id</text><text x="286" y="110" text-anchor="end" fill="#64748b">bigint PK</text>
    <text x="64" y="134">name</text><text x="286" y="134" text-anchor="end" fill="#64748b">varchar</text>
    <text x="64" y="158">open_at</text><text x="286" y="158" text-anchor="end" fill="#64748b">instant</text>
    <text x="64" y="180">close_at</text><text x="286" y="180" text-anchor="end" fill="#64748b">instant</text>
  </g>

  <!-- COURSE -->
  <g filter="url(#sh)">
    <rect x="430" y="60" width="260" height="170" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="430" y="60" width="260" height="30" rx="8" fill="#10b981"/>
    <rect x="430" y="78" width="260" height="12" fill="#10b981"/>
  </g>
  <text x="444" y="81" font-size="14" font-weight="700" fill="#fff">COURSE 课程</text>
  <g font-size="12.5" fill="#1e293b">
    <text x="444" y="110">🔑 id</text><text x="676" y="110" text-anchor="end" fill="#64748b">bigint PK</text>
    <text x="444" y="134">name</text><text x="676" y="134" text-anchor="end" fill="#64748b">varchar</text>
    <text x="444" y="158">teacher</text><text x="676" y="158" text-anchor="end" fill="#64748b">varchar</text>
    <text x="444" y="182">time_slot</text><text x="676" y="182" text-anchor="end" fill="#64748b">varchar</text>
    <text x="444" y="206">capacity</text><text x="676" y="206" text-anchor="end" fill="#64748b">int</text>
    <text x="444" y="226" font-style="italic" fill="#0369a1">↳ batch_id</text><text x="676" y="226" text-anchor="end" fill="#64748b">FK</text>
  </g>

  <!-- ENROLLMENT -->
  <g filter="url(#sh)">
    <rect x="700" y="300" width="270" height="160" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="700" y="300" width="270" height="30" rx="8" fill="#2563eb"/>
    <rect x="700" y="318" width="270" height="12" fill="#2563eb"/>
  </g>
  <text x="714" y="321" font-size="14" font-weight="700" fill="#fff">ENROLLMENT 选课记录</text>
  <g font-size="12.5" fill="#1e293b">
    <text x="714" y="350">🔑 id</text><text x="956" y="350" text-anchor="end" fill="#64748b">bigint PK</text>
    <text x="714" y="374" fill="#b45309">student_id</text><text x="956" y="374" text-anchor="end" fill="#64748b">UK*</text>
    <text x="714" y="398" fill="#b45309">course_id</text><text x="956" y="398" text-anchor="end" fill="#64748b">UK*</text>
    <text x="714" y="422">status</text><text x="956" y="422" text-anchor="end" fill="#64748b">ENROLLED/CANCELLED</text>
    <text x="714" y="446">created_at</text><text x="956" y="446" text-anchor="end" fill="#64748b">instant</text>
  </g>
  <text x="714" y="478" font-size="10.5" fill="#b45309">* 唯一索引 (student_id, course_id) —— 防重复选课兜底</text>

  <!-- USERS -->
  <g filter="url(#sh)">
    <rect x="250" y="360" width="260" height="160" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="250" y="360" width="260" height="30" rx="8" fill="#8b5cf6"/>
    <rect x="250" y="378" width="260" height="12" fill="#8b5cf6"/>
  </g>
  <text x="264" y="381" font-size="14" font-weight="700" fill="#fff">USERS 用户</text>
  <g font-size="12.5" fill="#1e293b">
    <text x="264" y="410">🔑 id</text><text x="496" y="410" text-anchor="end" fill="#64748b">bigint PK</text>
    <text x="264" y="434">username</text><text x="496" y="434" text-anchor="end" fill="#64748b">unique</text>
    <text x="264" y="458">name</text><text x="496" y="458" text-anchor="end" fill="#64748b">varchar</text>
    <text x="264" y="482">password_hash</text><text x="496" y="482" text-anchor="end" fill="#64748b">BCrypt</text>
    <text x="264" y="506">role</text><text x="496" y="506" text-anchor="end" fill="#64748b">STUDENT/ADMIN</text>
  </g>
</svg>
