# 测试专用配置：用 H2 内存库代替 MySQL，避免测试依赖外部服务。
# Redis/Kafka 的连接是惰性创建的，无 @KafkaListener 时不会在启动时连接；
# 需要真实 Redis/Kafka 的集成测试将使用 Testcontainers / @EmbeddedKafka 单独配置。
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

app.jwt.secret=test-secret-key-which-is-long-enough-for-hs256-algorithm-256bits!!
app.jwt.expiration-minutes=120

# 测试默认走同步落库，避免依赖 Kafka；异步路径由专门的 @EmbeddedKafka 测试覆盖。
app.enroll.persist-mode=sync
app.enroll.topic=enroll-events

# Kafka 序列化配置（异步测试需要；同步测试不建消费者，无副作用）
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=edu.course.rush.*
spring.kafka.consumer.properties.spring.json.value.default.type=edu.course.rush.enrollment.mq.EnrollEvent
