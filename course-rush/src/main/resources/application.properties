spring.application.name=course-rush
server.port=8088

# ---------- MySQL ----------
spring.datasource.url=jdbc:mysql://localhost:3306/course_rush?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------- Redis ----------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---------- Kafka ----------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=enroll-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=edu.course.rush.*
spring.kafka.consumer.properties.spring.json.value.default.type=edu.course.rush.enrollment.mq.EnrollEvent

# ---------- 抢课落库模式：async=发 Kafka 异步落库（削峰，生产默认）; sync=同步写库（降级） ----------
app.enroll.persist-mode=async
app.enroll.topic=enroll-events
# 压测专用：模拟远程/高负载数据库的单次写入延迟(ms)，默认 0。仅用于演示 async vs sync 在"DB 是瓶颈"时的差异。
app.enroll.sim-write-latency-ms=0

# ---------- 限流：每个用户在 window 秒内最多 limit 次抢课请求 ----------
app.ratelimit.enroll.limit=100
app.ratelimit.enroll.window-seconds=1

# ---------- JWT ----------
app.jwt.secret=change-this-secret-to-a-long-random-string-at-least-256-bits-long!!
app.jwt.expiration-minutes=120
